services:
  postgres:
    image: postgres:16
    restart: "no"
    ports:
      - "127.0.0.1:55432:5432"
    environment:
      POSTGRES_USER: finnews
      POSTGRES_PASSWORD: finnews
      POSTGRES_DB: finnews
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finnews -d finnews"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - finnews_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    # Optional local integration database only. Stop it with:
    # docker compose down

volumes:
  finnews_postgres_data:

networks:
  default:
    driver: bridge
