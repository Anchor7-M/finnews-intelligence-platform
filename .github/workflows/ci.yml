name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e backend[dev]
      - run: python -m pytest --cov=finnews --cov-report=term-missing --cov-fail-under=80
        working-directory: backend
      - run: ruff check .
        working-directory: backend
      - run: ruff format --check .
        working-directory: backend
      - run: mypy src tests
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run format:check
        working-directory: frontend
      - run: npm run typecheck
        working-directory: frontend
      - run: npm run test:unit -- --run
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: finnews
          POSTGRES_PASSWORD: finnews
          POSTGRES_DB: finnews
        ports:
          - 55432:5432
        options: >-
          --health-cmd "pg_isready -U finnews -d finnews"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e backend[dev]
      - run: alembic upgrade head
        working-directory: backend
      - run: python -m pytest -m postgres
        working-directory: backend
